<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Premium mobile-first dashboard and listing experience powered by Google Sheets."
    />
    <title>Jambhulsangh | Live Dashboard</title>
    <link rel="icon" href="logo.jpeg" type="image/jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/main.css?v=5" />
  </head>
  <body>
    <nav class="floating-nav glass" aria-label="Main navigation">
      <a class="brand-lockup" href="#top">
        <img class="brand-mark brand-logo" src="logo2.png" alt="Jambhulsangh logo" />
        <span class="brand-copy">
          <strong>Jambhulsangh</strong>
          <small>Jambhul growers network</small>
        </span>
      </a>

      <div class="nav-links">
        <a href="#overview">Overview</a>
        <a href="#listings">Listings</a>
      </div>

      <div class="nav-actions">
        <div id="syncIndicator" class="status-pill" role="status" aria-live="polite">
          Connecting
        </div>
        <button id="refreshButton" class="button button-secondary compact-button" type="button">
          Refresh
        </button>
        <button id="themeToggle" class="button button-secondary compact-button" type="button">
          Dark mode
        </button>
        <button id="langToggle" class="button button-secondary compact-button" type="button">
          मराठी
        </button>
        <button id="mobileMenuButton" class="button button-primary compact-button mobile-only" type="button" style="padding: 0.5rem 0.85rem; font-size: 0.85rem;">
          ☰ Menu
        </button>
      </div>
    </nav>

    <main id="top" class="page-shell">
      <section class="photo-showcase reveal" aria-labelledby="galleryTitle">

        <div class="photo-slider">
          <div id="photoSliderTrack" class="photo-slider-track"></div>
        </div>
      </section>

      <section id="overview" class="stats-strip reveal">
        <div id="statsGrid" class="stats-grid"></div>
      </section>

      <section id="listings" class="catalog-section">
        <div class="catalog-header reveal">
          <div>
            <span class="eyebrow">Live inventory</span>
            <h2>Search, filter, sort, and scan with confidence.</h2>
          </div>

        </div>

        <div class="catalog-layout">
          <div class="catalog-main">
            <div class="toolbar glass reveal">
              <label class="search-shell" for="searchInput">
                <span class="search-icon">Search</span>
                <input
                  id="searchInput"
                  type="search"
                  placeholder="Search titles, categories, owners, locations..."
                  autocomplete="off"
                />
                <button
                  id="clearSearchButton"
                  class="clear-button hidden"
                  type="button"
                  aria-label="Clear search"
                >
                  Clear
                </button>
              </label>

              <div class="toolbar-actions">
                <div class="column-menu-shell desktop-only">
                  <button
                    id="columnToggleButton"
                    class="button button-secondary"
                    type="button"
                    aria-expanded="false"
                  >
                    Columns
                  </button>
                  <div id="columnMenu" class="column-menu glass hidden"></div>
                </div>

                <button
                  id="openFilterSheetButton"
                  class="button button-secondary"
                  type="button"
                >
                  Filters
                </button>
              </div>
            </div>

            <div class="list-surface">
              <div id="mobileCards" class="mobile-cards mobile-only"></div>

              <div class="table-surface glass desktop-only">
                <div class="table-scroll">
                  <table class="data-table">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                  </table>
                </div>
              </div>

              <div id="emptyState" class="empty-state hidden"></div>
              <div id="pagination" class="pagination desktop-only"></div>
              <div id="loadMoreHint" class="load-more-hint mobile-only"></div>
              <div id="infiniteSentinel" class="infinite-sentinel mobile-only" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="filterSheetBackdrop" class="sheet-backdrop hidden">
      <section
        id="filterSheet"
        class="filter-sheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="filterSheetTitle"
      >
        <div class="sheet-handle"></div>

        <div class="sheet-header">
          <div>
            <span class="eyebrow">Filters</span>
            <h3 id="filterSheetTitle">Tune the listing view</h3>
          </div>
          <button id="closeFilterSheetButton" class="button button-secondary compact-button" type="button">
            Close
          </button>
        </div>

        <div id="mobileFilters" class="sheet-content"></div>

        <div class="sheet-footer">
          <button id="resetFiltersMobile" class="button button-secondary" type="button">
            Reset
          </button>
          <button id="doneFilterSheetButton" class="button button-primary" type="button">
            Show results
          </button>
        </div>
      </section>
    </div>

    <div id="mobileMenuBackdrop" class="sheet-backdrop hidden">
      <section
        id="mobileMenuSheet"
        class="filter-sheet"
        role="dialog"
        aria-modal="true"
        aria-labelledby="mobileMenuTitle"
      >
        <div class="sheet-handle"></div>

        <div class="sheet-header">
          <div>
            <span class="eyebrow" id="mobileMenuSubtitle">Menu</span>
            <h3 id="mobileMenuTitle" style="font-family: 'Poppins', sans-serif;">Quick Actions</h3>
          </div>
          <button id="closeMobileMenuButton" class="button button-secondary compact-button" type="button">
            Close
          </button>
        </div>

        <div class="sheet-content" style="display: flex; flex-direction: column; gap: 0.85rem; padding: 0.8rem 0;">
          <button id="menuRefreshButton" class="button button-primary" type="button" style="justify-content: center; gap: 0.6rem; width: 100%;">
            🔄 <span id="menuRefreshText">Refresh Data</span>
          </button>
          <button id="menuThemeToggle" class="button button-secondary" type="button" style="justify-content: center; gap: 0.6rem; width: 100%;">
            🌙 <span id="menuThemeText">Dark Mode</span>
          </button>
          <button id="menuLangToggle" class="button button-secondary" type="button" style="justify-content: center; gap: 0.6rem; width: 100%;">
            🌐 <span id="menuLangText">मराठी</span>
          </button>
          <div style="height: 1px; background: var(--border); margin: 0.5rem 0;"></div>
          <a href="#overview" id="menuOverviewLink" class="button button-secondary" style="justify-content: center; gap: 0.6rem; width: 100%;">
            📊 <span id="menuOverviewText">Overview</span>
          </a>
          <a href="#listings" id="menuListingsLink" class="button button-secondary" style="justify-content: center; gap: 0.6rem; width: 100%;">
            📋 <span id="menuListingsText">Listings</span>
          </a>
        </div>
      </section>
    </div>

    <div id="detailModalBackdrop" class="modal-backdrop hidden">
      <section
        id="detailModal"
        class="detail-modal glass"
        role="dialog"
        aria-modal="true"
        aria-labelledby="detailTitle"
      >
        <div class="modal-header">
          <div>
            <span class="eyebrow">Record details</span>
            <h3 id="detailTitle">Loading record</h3>
          </div>

          <div class="modal-actions">
            <button id="shareRecordButton" class="button button-secondary compact-button" type="button">
              Share
            </button>
            <button
              id="closeDetailModalButton"
              class="button button-secondary compact-button"
              type="button"
            >
              Close
            </button>
          </div>
        </div>

        <div id="detailBody" class="detail-body"></div>
      </section>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script defer src="assets/js/config.js"></script>
    <script defer src="assets/js/mock-data.js"></script>
    <script defer src="assets/js/sheets.js"></script>
    <script defer src="assets/js/app.js?v=4"></script>
  </body>
</html>
